<html lang="pt-BR">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engajamento · Acamp's 2026.2</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --verde: #d26026; --verde-claro: #d7bd5b; --verde-medio: #ef773b; --borda-verde: #f27536;
    --cinza-fundo: #F4F3EF; --cinza-borda: #E0DED6; --cinza-texto: #6B6B67;
    --branco: #FFFFFF; --preto: #1A1A18;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { font-family: var(--font); background: var(--cinza-fundo); color: var(--preto); min-height: 100vh; }

  .topo { background: var(--verde); color: white; text-align: center; padding: 28px 20px 24px; }
  .topo-evento { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; opacity: .7; margin-bottom: 6px; }
  .topo-titulo { font-size: 26px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
  .topo-sub { font-size: 13px; opacity: .75; }

  .contador { display: flex; justify-content: center; background: var(--branco); border-bottom: 0.5px solid var(--cinza-borda); }
  .contador-item { flex: 1; max-width: 140px; text-align: center; padding: 14px 8px; border-right: 0.5px solid var(--cinza-borda); }
  .contador-item:last-child { border-right: none; }
  .contador-num { font-size: 24px; font-weight: 700; color: var(--verde); line-height: 1; }
  .contador-label { font-size: 10px; color: var(--cinza-texto); text-transform: uppercase; letter-spacing: .06em; margin-top: 2px; }

  .busca-wrap { max-width: 420px; margin: 20px auto 0; padding: 0 16px; position: relative; }
  .busca-wrap svg { position: absolute; left: 26px; top: 50%; transform: translateY(-50%); color: var(--cinza-texto); pointer-events: none; }
  .busca-wrap input { width: 100%; padding: 10px 14px 10px 36px; border: 0.5px solid var(--cinza-borda); border-radius: 99px; font-size: 14px; font-family: var(--font); background: var(--branco); color: var(--preto); outline: none; }
  .busca-wrap input:focus { border-color: var(--verde-medio); box-shadow: 0 0 0 3px rgba(99,153,34,.1); }

  .secao-titulo { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--cinza-texto); padding: 20px 14px 8px; max-width: 1200px; margin: 0 auto; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; padding: 0 14px 16px; max-width: 1200px; margin: 0 auto; }

  .card { background: var(--branco); border: 0.5px solid var(--cinza-borda); border-radius: 14px; overflow: hidden; }
  .card-header { padding: 12px 14px 10px; border-bottom: 0.5px solid var(--cinza-borda); background: var(--verde-claro); }
  .card-header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .card-nome { font-size: 14px; font-weight: 700; color: var(--verde); }
  .card-badge { background: var(--verde); color: white; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 99px; white-space: nowrap; flex-shrink: 0; }
  .card-coord { display: flex; align-items: center; gap: 7px; background: var(--branco); border: 0.5px solid var(--borda-verde); border-radius: 7px; padding: 6px 9px; }
  .coord-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--verde); color: white; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .coord-info { flex: 1; min-width: 0; }
  .coord-label { font-size: 9px; text-transform: uppercase; letter-spacing: .06em; color: var(--verde-medio); font-weight: 600; }
  .coord-nome { font-size: 11px; font-weight: 600; color: var(--preto); }
  .coord-wpp { font-size: 10px; color: var(--cinza-texto); }

  .membros { padding: 3px 0; }
  .membro { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-bottom: 0.5px solid #F4F3EF; }
  .membro:last-child { border-bottom: none; }
  .membro:hover { background: var(--cinza-fundo); }
  .m-avatar { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; flex-shrink: 0; }
  .m-info { flex: 1; min-width: 0; }
  .m-nome { font-size: 12px; font-weight: 500; color: var(--preto); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .m-wpp { font-size: 10px; color: var(--cinza-texto); }

  .hl { background: #FFF176; border-radius: 2px; padding: 0 1px; }
  .nenhum { text-align: center; padding: 48px 20px; color: var(--cinza-texto); font-size: 14px; }
  .rodape { text-align: center; padding: 16px; font-size: 11px; color: var(--cinza-texto); border-top: 0.5px solid var(--cinza-borda); background: var(--branco); margin-top: 8px; }

  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr; }
    .topo-titulo { font-size: 22px; }
  }
</style>

const EQUIPES = GRUPOS.flatMap(g => g.equipes);

document.getElementById('cnt-equipes').textContent = EQUIPES.length;

function ini(n){ return n.trim().split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join(''); }
function hl(t,q){ if(!q)return t; const i=t.toLowerCase().indexOf(q.toLowerCase()); if(i===-1)return t; return t.slice(0,i)+`<span class="hl">${t.slice(i,i+q.length)}</span>`+t.slice(i+q.length); }

function filtrar(){ render(document.getElementById('busca').value.trim()); }

function renderCard(eq, q){
  const [bg,fg]=eq.cor;
  const membrosHTML=eq.membros.length===0?`<div style="padding:10px 14px;font-size:12px;color:var(--cinza-texto);">Aguardando servos</div>`:eq.membros.map(m=>`<div class="membro">
    <div class="m-avatar" style="background:${bg};color:${fg};">${ini(m.nome)}</div>
    <div class="m-info"><div class="m-nome">${hl(m.nome,q)}</div>${m.wpp?`<div class="m-wpp">${m.wpp}</div>`:''}</div>
  </div>`).join('');
  const coordBlock = eq.coord.nome && eq.coord.nome !== '—' ? `<div class="card-coord">
    <div class="coord-avatar">${ini(eq.coord.nome)}</div>
    <div class="coord-info">
      <div class="coord-label">Coordenador(a)</div>
      <div class="coord-nome">${eq.coord.nome}</div>
      ${eq.coord.wpp?`<div class="coord-wpp">${eq.coord.wpp}</div>`:''}
    </div></div>` : '';
  return `<div class="card">
    <div class="card-header">
      <div class="card-header-top"><div class="card-nome">${eq.nome}</div><div class="card-badge">${eq.membros.length} servo${eq.membros.length!==1?'s':''}</div></div>
      ${coordBlock}
    </div>
    <div class="membros">${membrosHTML}</div>
  </div>`;
}

function render(q){
  const ql=q.toLowerCase();
  const conteudo=document.getElementById('conteudo');
  const filtradas=EQUIPES.map(eq=>({...eq,membros:ql?eq.membros.filter(m=>m.nome.toLowerCase().includes(ql)):eq.membros})).filter(eq=>!ql||eq.membros.length>0);
  if(!filtradas.length){
    conteudo.innerHTML=`<div class="nenhum">Nenhum servo encontrado com o nome "<strong>${q}</strong>".</div>`;
    return;
  }
  conteudo.innerHTML=`<div class="grid">${filtradas.map(eq=>renderCard(eq,q)).join('')}</div>`;
}

render('');
